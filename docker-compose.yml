# ─────────────────────────────────────────────────────────────
# ensage — Docker Compose
#
# Quick start:
#   cp .env.example .env
#   # Edit .env and set TOKEN_SECRET to a random string
#   docker compose up -d
#
# Data is stored in ./data (uploads + SQLite database).
# ─────────────────────────────────────────────────────────────

services:
  ensage:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Persistent data: SQLite database + uploaded files
      - ./data:/data
    environment:
      # Required: change this to a long random secret
      TOKEN_SECRET: ${TOKEN_SECRET:?TOKEN_SECRET must be set in .env}

      # Optional overrides (defaults are production-safe)
      NODE_ENV: production
      PORT: 3000
      UPLOAD_DIR: /data/uploads
      DB_PATH: /data/db/ensage.db
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-524288000}
      MAX_TEXT_SIZE: ${MAX_TEXT_SIZE:-5242880}
      ACCENT_COLOR: ${ACCENT_COLOR:-#22c55e}
      RATE_LIMIT_UPLOAD: ${RATE_LIMIT_UPLOAD:-10}
      RATE_LIMIT_READ: ${RATE_LIMIT_READ:-100}
      RATE_LIMIT_AUTH: ${RATE_LIMIT_AUTH:-20}

      # Optional: Exa AI summaries for links
      EXA_API_KEY: ${EXA_API_KEY:-}

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

